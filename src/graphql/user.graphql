extend type User {
	followersCount: Int!
	followingCount: Int!
	postsCount: Int!
	likesCount: Int!
	isFollowing: Boolean!
	isFollowedBy: Boolean!
	isBlocked: Boolean!
	isBlockedBy: Boolean!
	followers: [User!]!
	following: [User!]!
	bookmarks(limit: Int, offset: Int): [Post!]!
}

type UserEdge {
	cursor: String!
	node: User!
}

type UserConnection {
	edges: [UserEdge!]!
	pageInfo: PageInfo!
	totalCount: Int!
}
