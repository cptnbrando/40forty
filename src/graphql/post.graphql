extend type Post {
	repliesCount: Int!
	retweetsCount: Int!
	quotesCount: Int!
	likesCount: Int!
	bookmarksCount: Int!
	viewsCount: Int!
	isLiked: Boolean!
	isRetweeted: Boolean!
	isBookmarked: Boolean!
	isReplyTo: Boolean!
	media: [Media!]
	mentions: [User!]
	retweetOf: Post
	quoteOf: Post
	retweets(limit: Int, offset: Int): [Post!]!
	quotes(limit: Int, offset: Int): [Post!]!
	likedBy(limit: Int, offset: Int): [User!]!
}

type PostEdge {
	cursor: String!
	node: Post!
}

type PostConnection {
	edges: [PostEdge!]!
	pageInfo: PageInfo!
	totalCount: Int!
}
