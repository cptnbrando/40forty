type Post {
  id: ID!
  author: User!
  content: String!
  postType: PostType!
  createdAt: DateTime!
  updatedAt: DateTime!
  repliesCount: Int!
  retweetsCount: Int!
  quotesCount: Int!
  likesCount: Int!
  bookmarksCount: Int!
  viewsCount: Int!
  isLiked: Boolean!
  isRetweeted: Boolean!
  isBookmarked: Boolean!
  isReplyTo: Boolean!
  media: [Media!]
  hashtags: [Hashtag!]
  mentions: [User!]
  replyTo: Post
  retweetOf: Post
  quoteOf: Post
  replies(limit: Int, offset: Int, sortBy: SortOrder): [Post!]!
  retweets(limit: Int, offset: Int): [Post!]!
  quotes(limit: Int, offset: Int): [Post!]!
  likedBy(limit: Int, offset: Int): [User!]!
}

type PostEdge {
  cursor: String!
  node: Post!
}

type PostConnection {
  edges: [PostEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}
