type Notification {
  id: ID!
  recipient: User!
  actor: User!
  type: NotificationType!
  post: Post
  read: Boolean!
  createdAt: DateTime!
}

type NotificationEdge {
  cursor: String!
  node: Notification!
}

type NotificationConnection {
  edges: [NotificationEdge!]!
  pageInfo: PageInfo!
  unreadCount: Int!
}
